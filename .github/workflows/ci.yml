name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -x -q --tb=short

  # PR-11: SAST — static analysis for common security issues
  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: |
          bandit -r apps/ packages/ workers/ \
            --severity-level medium \
            --confidence-level medium \
            --skip B101,B105,B311 \
            -f json -o bandit-report.json || true
          bandit -r apps/ packages/ workers/ \
            --severity-level medium \
            --confidence-level medium \
            --skip B101,B105,B311
        # B101: assert used (common in tests/dev code)
        # B105: hardcoded password string (too many false positives on test fixtures)
        # B311: random not suitable for security (used for non-security IDs)

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # PR-11: Dependency audit — check for known CVEs in Python packages
  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -e ".[all]"

      - name: Run pip-audit
        run: pip-audit --skip-editable --output-format=json > pip-audit-report.json || pip-audit --skip-editable

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  # PR-11: Secret scanning — detect accidentally committed credentials
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
